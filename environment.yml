# Legacy / auxiliary Conda environment kept on purpose.
# Use this for the older Python-only toolchain, notebooks, dataset scripts,
# and optional standalone debugging utilities.
# The current Web grasp pipeline should run from the WSL2 ROS 2 Jazzy shell.
# Update command:
#   conda env update -f environment.yml --prune
name: dayiprogramme312
channels:
  - conda-forge
  - pytorch
dependencies:
  - python=3.12
  - pip
  - setuptools
  - wheel
  - pybullet
  - numpy
  - scipy
  - pandas
  - matplotlib
  - scikit-learn
  - scikit-image
  - opencv
  - pyqt
  - open3d
  - h5py
  - pillow
  - psutil
  - polars
  - pytorch
  - torchvision
  - torchaudio
  - pip:
      - -r requirements.txt
